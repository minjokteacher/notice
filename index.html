<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>민사고 공지 아카이브</title>
<style>
:root {
  --bg: #FAFAF7;
  --card: #FFFFFF;
  --text: #1A1A1A;
  --text-secondary: #6B6B6B;
  --text-tertiary: #9B9B9B;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.16);
  --accent: #185FA5;
  --accent-bg: #E6F1FB;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1A1A1A;
    --card: #242422;
    --text: #F5F5F0;
    --text-secondary: #B8B8B0;
    --text-tertiary: #888880;
    --border: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.20);
    --accent: #85B7EB;
    --accent-bg: #0C447C;
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', 'Pretendard', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body { padding: 1.5rem 1rem 3rem; }

.container { max-width: 760px; margin: 0 auto; }

header { margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; flex-wrap: wrap; }

h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; letter-spacing: -0.01em; }

header p { font-size: 13px; color: var(--text-secondary); }

.reload-btn {
  font-size: 13px; padding: 6px 12px; border: 0.5px solid var(--border-strong);
  border-radius: 8px; background: var(--card); color: var(--text); cursor: pointer;
  font-family: inherit; transition: background 0.1s;
}
.reload-btn:hover { background: var(--bg); }
.reload-btn:active { transform: scale(0.98); }

.search-wrapper { position: relative; margin-bottom: 12px; }

.search-wrapper input {
  width: 100%; padding: 10px 14px 10px 38px; font-size: 14px;
  font-family: inherit; border: 0.5px solid var(--border-strong);
  border-radius: 8px; background: var(--card); color: var(--text);
}
.search-wrapper input:focus { outline: none; border-color: var(--accent); }

.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-tertiary); pointer-events: none; display: flex;
}

.filters { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }

.filter-btn {
  font-size: 13px; padding: 6px 14px; border: 0.5px solid var(--border-strong);
  border-radius: 8px; background: var(--card); color: var(--text); cursor: pointer;
  font-family: inherit; transition: background 0.1s;
}
.filter-btn:hover { background: var(--bg); }
.filter-btn.active {
  background: var(--text); color: var(--bg); border-color: var(--text);
}
.filter-btn .count { opacity: 0.5; margin-left: 4px; font-variant-numeric: tabular-nums; }

.posts { display: flex; flex-direction: column; gap: 12px; }

.post {
  background: var(--card); border-radius: 12px;
  border: 0.5px solid var(--border); padding: 14px 16px;
}

.post-header {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 6px; gap: 8px;
}

.post-author { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.author-name { font-weight: 500; font-size: 14px; }

.group-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 8px; white-space: nowrap;
}

.post-time {
  font-size: 12px; color: var(--text-tertiary); white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

.post-body {
  margin: 0 0 8px; font-size: 14px; line-height: 1.6;
  white-space: pre-wrap; word-break: break-word;
}

.post-link {
  font-size: 12px; color: var(--accent); text-decoration: none;
  display: inline-block; margin-top: 4px;
}
.post-link:hover { text-decoration: underline; }

.status {
  text-align: center; padding: 3rem 1rem; color: var(--text-secondary); font-size: 14px;
}

footer {
  margin-top: 2rem; padding-top: 1.5rem;
  border-top: 0.5px solid var(--border);
  font-size: 12px; color: var(--text-tertiary); text-align: center;
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>민사고 공지 아카이브</h1>
      <p id="status-line">페북 그룹 공지 자동 수집</p>
    </div>
    <button class="reload-btn" onclick="load()">새로고침</button>
  </header>

  <div class="search-wrapper">
    <span class="search-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </span>
    <input type="text" id="search" placeholder="공지 본문, 작성자, 그룹 검색...">
  </div>

  <div class="filters" id="filters"></div>

  <div id="posts" class="posts">
    <div class="status">불러오는 중...</div>
  </div>

  <footer>
    페이스북 그룹 알림 메일 기반 · 약 5분마다 자동 업데이트
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
const SHEET_ID = '1icb7juWA3zytYHT23jPwoChxULZ2yn-w_MxrrxS5ziE';

const GROUP_COLORS = [
  { bg: '#E6F1FB', fg: '#185FA5' },
  { bg: '#FAEEDA', fg: '#854F0B' },
  { bg: '#EEEDFE', fg: '#3C3489' },
  { bg: '#FBEAF0', fg: '#72243E' },
  { bg: '#E1F5EE', fg: '#085041' },
  { bg: '#EAF3DE', fg: '#27500A' },
  { bg: '#FAECE7', fg: '#712B13' },
  { bg: '#FCEBEB', fg: '#A32D2D' },
];

function groupColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) {
    h = ((h << 5) - h) + name.charCodeAt(i);
    h |= 0;
  }
  return GROUP_COLORS[Math.abs(h) % GROUP_COLORS.length];
}

function parseDate(str) {
  if (!str) return null;
  const d = new Date(str.replace(' ', 'T'));
  return isNaN(d) ? null : d;
}

function formatTime(str) {
  const d = parseDate(str);
  if (!d) return str || '';
  const now = new Date();
  const diff = now - d;
  const min = Math.floor(diff / 60000);
  const hr = Math.floor(diff / 3600000);
  const day = Math.floor(diff / 86400000);

  if (min < 1) return '방금 전';
  if (min < 60) return min + '분 전';
  if (hr < 24 && d.getDate() === now.getDate()) return hr + '시간 전';

  const h = d.getHours();
  const m = String(d.getMinutes()).padStart(2, '0');
  const ampm = h < 12 ? '오전' : '오후';
  const hh = h === 0 ? 12 : (h > 12 ? h - 12 : h);

  if (day === 0) return `오늘 ${ampm} ${hh}:${m}`;
  if (day === 1) return `어제 ${ampm} ${hh}:${m}`;
  if (day < 7) return day + '일 전';

  return `${d.getMonth() + 1}월 ${d.getDate()}일 ${ampm} ${hh}:${m}`;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

let allPosts = [];
let currentGroup = 'all';
let currentSearch = '';

function render() {
  const el = document.getElementById('posts');
  let filtered = allPosts;

  if (currentGroup !== 'all') {
    filtered = filtered.filter(p => p.group === currentGroup);
  }
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(p =>
      (p.body || '').toLowerCase().includes(q) ||
      (p.author || '').toLowerCase().includes(q) ||
      (p.group || '').toLowerCase().includes(q)
    );
  }

  if (filtered.length === 0) {
    el.innerHTML = '<div class="status">조건에 맞는 공지가 없습니다.</div>';
    return;
  }

  el.innerHTML = filtered.map(p => {
    const c = groupColor(p.group || '');
    return `
      <div class="post">
        <div class="post-header">
          <div class="post-author">
            <span class="author-name">${escapeHtml(p.author) || '익명'}</span>
            ${p.group ? `<span class="group-badge" style="background:${c.bg};color:${c.fg};">${escapeHtml(p.group)}</span>` : ''}
          </div>
          <span class="post-time">${escapeHtml(formatTime(p.posted_at))}</span>
        </div>
        ${p.body ? `<p class="post-body">${escapeHtml(p.body)}</p>` : ''}
        ${p.post_url ? `<a class="post-link" href="${escapeHtml(p.post_url)}" target="_blank" rel="noopener noreferrer">↗ 페이스북 원문 보기</a>` : ''}
      </div>
    `;
  }).join('');
}

function renderFilters() {
  const el = document.getElementById('filters');
  const counts = {};
  for (const p of allPosts) {
    if (p.group) counts[p.group] = (counts[p.group] || 0) + 1;
  }
  const list = Object.entries(counts).sort((a, b) => b[1] - a[1]);

  el.innerHTML =
    `<button class="filter-btn ${currentGroup === 'all' ? 'active' : ''}" data-group="all">전체 <span class="count">${allPosts.length}</span></button>` +
    list.map(([n, c]) =>
      `<button class="filter-btn ${currentGroup === n ? 'active' : ''}" data-group="${escapeHtml(n)}">${escapeHtml(n)} <span class="count">${c}</span></button>`
    ).join('');

  el.querySelectorAll('.filter-btn').forEach(b => {
    b.addEventListener('click', () => {
      currentGroup = b.dataset.group;
      renderFilters();
      render();
    });
  });
}

async function load() {
  const statusLine = document.getElementById('status-line');
  statusLine.textContent = '불러오는 중...';
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&_=${Date.now()}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Fetch failed: ' + res.status);
    const text = await res.text();
    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });

    allPosts = parsed.data
      .map(r => ({
        posted_at: r['게시 시간'] || '',
        author: r['작성자'] || '',
        group: r['그룹'] || '',
        body: r['본문'] || '',
        post_url: r['원문 링크'] || '',
        received_at: r['수신 시간'] || '',
      }))
      .filter(p => p.body || p.author || p.group)
      .sort((a, b) => (parseDate(b.posted_at) || 0) - (parseDate(a.posted_at) || 0));

    statusLine.textContent = `${allPosts.length}개 공지 · 약 5분마다 자동 업데이트`;
    renderFilters();
    render();
  } catch (e) {
    console.error(e);
    document.getElementById('posts').innerHTML =
      '<div class="status">데이터를 불러올 수 없습니다.<br>잠시 후 새로고침 버튼을 눌러주세요.</div>';
    statusLine.textContent = '연결 실패';
  }
}

document.getElementById('search').addEventListener('input', (e) => {
  currentSearch = e.target.value.trim();
  render();
});

load();
</script>
</body>
</html>
